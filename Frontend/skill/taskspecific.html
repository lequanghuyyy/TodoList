<!-- SideNavBar (Suppressed for Task Detail/Transactional Context) -->
<!-- TopNavBar (Suppressed for Task Detail Context - Using Contextual Header instead) -->
<!-- Main Workspace Area -->
<main class="flex-1 flex flex-col h-screen overflow-hidden">
<!-- Contextual Header -->
<header class="flex-none flex items-center justify-between px-section-padding py-4 border-b border-surface-variant bg-surface">
<div class="flex items-center gap-4">
<button class="h-touch-target-min w-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex gap-2">
<span class="text-on-surface-variant text-label-md font-label-md bg-surface-container px-3 py-1.5 rounded-full flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-secondary-container"></span>
                        High Priority
                    </span>
<span class="text-on-surface-variant text-label-md font-label-md bg-surface-container px-3 py-1.5 rounded-full flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">folder_open</span>
                        Q3 Launch
                    </span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="h-touch-target-min px-4 border border-outline-variant rounded-full text-on-surface hover:bg-surface-container-low transition-colors font-body-md flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
                    Edit
                </button>
<button class="h-touch-target-min w-touch-target-min border border-outline-variant rounded-full text-error hover:bg-error-container hover:border-error-container transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
<button class="h-touch-target-min px-6 bg-primary-container text-on-primary rounded-full hover:opacity-90 transition-opacity font-label-md font-semibold flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Mark as Complete
                </button>
</div>
</header>

<div class="flex-1 overflow-y-auto p-section-padding">
<div class="max-w-5xl mx-auto flex flex-col lg:flex-row gap-8">

<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div>

<p class="text-body-lg font-body-lg text-on-surface-variant">Review all shared components, ensure semantic HTML tags are used, and verify against Figma designs.</p>
</div>
<!-- Large Countdown Timer -->
<div class="flex items-center gap-6 p-6 bg-surface-container-low rounded-lg border border-outline-variant/50">
<div class="flex-none flex items-center justify-center w-16 h-16 bg-surface rounded-full shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="timer">timer</span>
</div>
<div class="flex-1 flex gap-4">
<div class="flex flex-col">
<span class="text-display font-display text-on-surface leading-none tracking-tight">02</span>
<span class="text-label-md font-label-md text-on-surface-variant uppercase mt-1">Days</span>
</div>
<span class="text-display font-display text-outline-variant leading-none tracking-tight">:</span>
<div class="flex flex-col">
<span class="text-display font-display text-on-surface leading-none tracking-tight">14</span>
<span class="text-label-md font-label-md text-on-surface-variant uppercase mt-1">Hours</span>
</div>
<span class="text-display font-display text-outline-variant leading-none tracking-tight">:</span>
<div class="flex flex-col">
<span class="text-display font-display text-on-surface leading-none tracking-tight">45</span>
<span class="text-label-md font-label-md text-on-surface-variant uppercase mt-1">Mins</span>
</div>
</div>

<span class="text-body-md font-body-md text-on-surface font-medium">Oct 24, 2023, 5:00 PM</span>

</div>

</div>
